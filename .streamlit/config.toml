[theme]
primaryColor = "#5c6bc0"
backgroundColor = "#0f1117"
secondaryBackgroundColor = "#1c1f2e"
textColor = "#ffffff"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "viewer"

[logger]
level = "info"

[client.toolbarMode]
# Deployment-safe: hide dev toolbar in production

[browser]
gatherUsageStats = false

[server]
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = false
